{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>To do 一覧</title>
    <link rel="stylesheet" href="{% static 'todo_app/style.css' %}">
</head>
<body>
    <main class="container">
        <div class="page-header">
            <h1>To do 一覧</h1>
            <a class="button" href="{% url 'todo_add' %}">追加</a>
        </div>

        {% if todos %}
            <table class="todo-table">
                <thead>
                    <tr>
                        <th>To do</th>
                        <th>日時</th>
                        <th>場所</th>
                        <th>更新日</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for todo in todos %}
                        <tr>
                            <td>{{ todo.title }}</td>
                            <td>{{ todo.scheduled_at|default:"未定" }}</td>
                            <td>{{ todo.location|default:"-" }}</td>
                            <td>{{ todo.updated_at }}</td>
                            <td class="actions">
                                <a class="button-secondary" href="{% url 'todo_detail' todo.pk %}">詳細</a>
                                <a class="button-secondary" href="{% url 'todo_edit' todo.pk %}">編集</a>
                                <a class="button-danger" href="{% url 'todo_delete' todo.pk %}">削除</a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        {% else %}
            <div class="empty-state">
                <p>To do はまだありません。</p>
                <a class="button" href="{% url 'todo_add' %}">最初の To do を追加</a>
            </div>
        {% endif %}
    </main>
</body>
</html>
